<!DOCTYPE html>
<html lang="en">
<head>

<title>SiteVision AI — Construction Intelligence</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔶</text></svg>" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  input::placeholder { color: #444; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
  @keyframes pulse { 0%,100% { transform:scale(1);opacity:1 } 50% { transform:scale(1.15);opacity:.7 } }
  @keyframes fadeIn { from { opacity:0;transform:translateY(8px) } to { opacity:1;transform:translateY(0) } }
  .fade-in { animation: fadeIn .3s ease-out }
  .app { max-width:480px; margin:0 auto; min-height:100vh; position:relative }
  .header { background:linear-gradient(180deg,#111 0%,#0a0a0a 100%); border-bottom:1px solid #1a1a1a; padding:14px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100 }
  .body { padding:20px; padding-bottom:40px }
  .card { background:#111; border:1px solid #1f1f1f; border-radius:12px; padding:20px; margin-bottom:12px }
  .card-hover { cursor:pointer; transition:border-color .15s }
  .card-hover:hover { border-color:#333 }
  .btn { border-radius:10px; padding:14px 20px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; width:100%; transition:all .15s; border:none }
  .btn-primary { background:#f97316; color:#000; letter-spacing:.5px }
  .btn-primary:active { background:#ea580c }
  .btn-secondary { background:#1a1a1a; color:#ccc; border:1px solid #2a2a2a }
  .btn-secondary:active { background:#222 }
  .btn-sm { border-radius:8px; padding:10px 16px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; display:inline-flex; align-items:center; gap:6px; background:#1a1a1a; color:#ccc; border:1px solid #2a2a2a }
  .btn-sm-accent { background:#f97316; color:#000; border:none }
  .btn:disabled,.btn-sm:disabled { opacity:.4; cursor:default }
  .tag { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#666; margin-bottom:8px }
  .section-title { font-size:18px; font-weight:800; color:#fff; letter-spacing:-.5px }
  .metric-box { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:8px; padding:12px 16px; text-align:center }
  .metric-label { font-size:9px; color:#666; letter-spacing:1px; text-transform:uppercase }
  .metric-value { font-size:16px; font-weight:800; color:#f97316; margin-top:4px }
  .mode-card { background:#111; border:1px solid #1f1f1f; border-radius:10px; padding:16px; cursor:pointer; transition:all .15s; display:flex; align-items:flex-start; gap:14px }
  .mode-card.active { background:#f9731612; border-color:#f97316 }
  .mode-card .mode-icon { color:#555 } .mode-card.active .mode-icon { color:#f97316 }
  .mode-card .mode-title { color:#ccc } .mode-card.active .mode-title { color:#fff }
  .conf { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:4px }
  .conf-high { color:#22c55e; background:#22c55e18; border:1px solid #22c55e33 }
  .conf-medium { color:#f59e0b; background:#f59e0b18; border:1px solid #f59e0b33 }
  .conf-low { color:#ef4444; background:#ef444418; border:1px solid #ef444433 }
  .input { background:#0d0d0d; border:1px solid #2a2a2a; border-radius:8px; padding:12px 16px; color:#fff; font-size:13px; font-family:inherit; width:100%; outline:none }
  .input:focus { border-color:#f97316 }
  .img-preview { width:100%; border-radius:10px; border:1px solid #1f1f1f; margin-bottom:16px; display:block }
  .capture-zone { border:2px dashed #f9731666; text-align:center; cursor:pointer; padding:32px; background:#f9731606; border-radius:12px; margin-bottom:12px; transition:border-color .15s }
  .capture-zone:hover { border-color:#f97316 }
  .actions-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:16px 0 }
  .action-card { text-align:center; cursor:pointer; padding:16px 8px; margin-bottom:0 }
  .action-card:hover { border-color:#333 }
  .loading-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:#0a0a0aee; display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px }
  .loading-box { background:#111; border:1px solid #f9731644; border-radius:16px; padding:40px 32px; text-align:center; max-width:320px; width:100% }
  .loading-pulse { width:56px; height:56px; border-radius:50%; background:#f9731622; border:2px solid #f97316; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; animation:pulse 1.5s ease-in-out infinite }
  .back-btn { background:none; border:none; color:#888; cursor:pointer; padding:4px; display:flex; align-items:center }
  .status-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; box-shadow:0 0 8px #22c55e66 }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px }
  .flex-row { display:flex; gap:8px }
  .flex-1 { flex:1 } .flex-2 { flex:2 }
  .mt-8{margin-top:8px} .mt-16{margin-top:16px} .mt-20{margin-top:20px}
  .mb-12{margin-bottom:12px} .mb-16{margin-bottom:16px} .mb-20{margin-bottom:20px} .mb-24{margin-bottom:24px}
  .text-center{text-align:center}
  .pill { font-size:11px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px; padding:4px 10px; color:#ccc; display:inline-block; margin:3px }
  .mode-badge { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#f97316; background:#f9731618; padding:2px 8px; border-radius:4px }
  .result-badge { font-size:10px; color:#888; background:#1a1a1a; padding:4px 10px; border-radius:6px; text-transform:uppercase; letter-spacing:1px; font-weight:700 }
  .issue-item { font-size:12px; color:#fca5a5; margin-bottom:4px }
  .rec-item { font-size:12px; color:#86efac; margin-bottom:4px }
  .note-card { border-left:3px solid #f97316 }
  .issue-card { border-left:3px solid #ef4444 }
  .rec-card { border-left:3px solid #22c55e }
  .warn-card { border-left:3px solid #f59e0b }
  .cost-card { border-color:#22c55e33; background:#22c55e08 }
  .ref-card { border-color:#f9731633; background:#f9731608 }
  .hidden { display:none }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.min.js"></script>

<script type="module">
const { useState, useRef, useCallback, createElement: h } = React;
const html = htm.bind(h);

const ANTHROPIC_MODEL = "claude-sonnet-4-20250514";

const uid = () => Math.random().toString(36).slice(2, 10);
const ts = () => new Date().toLocaleString("en-US", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
const fileToBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file);
});

// ── SVG Icons as functions ──────────────────────────────────
function icon(name, s = 18) {
  const p = { width: s, height: s, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", xmlns: "http://www.w3.org/2000/svg" };
  const paths = {
    camera: '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
    ruler: '<path d="M2 4h4v16H2z"/><path d="M6 12h2"/><path d="M6 8h3"/><path d="M6 16h3"/><path d="M6 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6"/>',
    box: '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
    clipboard: '<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>',
    chat: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
    folder: '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
    plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    glasses: '<circle cx="6" cy="15" r="4"/><circle cx="18" cy="15" r="4"/><path d="M10 15h4"/><path d="M2 15V9a2 2 0 0 1 2-2"/><path d="M22 15V9a2 2 0 0 1-2-2"/>',
    zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    chevron: '<polyline points="15 18 9 12 15 6"/>',
    chevronR: '<polyline points="9 18 15 12 9 6"/>',
    trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
    key: '<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>',
  };
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  return h("span", { dangerouslySetInnerHTML: { __html: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">${paths[name]}</svg>` }, style: { display: "inline-flex", flexShrink: 0, lineHeight: 0 } });
}

// ── AI Analysis ─────────────────────────────────────────────
async function analyzeImage(base64, mediaType, mode, customPrompt, apiKey) {
  const systemPrompts = {
    measure: `You are a construction measurement estimation AI. Analyze this construction site photo and:
1. Identify all visible surfaces, openings, and structural elements
2. Look for ANY reference objects that could establish scale (doors are ~6'8" tall, standard outlets are ~4.5" tall, 2x4 lumber is 1.5"x3.5", standard bricks are ~2.25"x3.625"x7.625", ceiling tiles are typically 2'x2' or 2'x4', standard interior doors are ~3'x6'8")
3. Estimate dimensions of walls, floors, ceilings, windows, doors, and any other measurable surfaces
4. Note confidence level for each measurement (high/medium/low based on reference clarity)
Respond ONLY in this JSON format, no markdown, no backticks:
{"measurements":[{"surface":"name","width_ft":0,"height_ft":0,"area_sqft":0,"confidence":"high|medium|low","notes":""}],"reference_used":"what you used for scale","room_type":"detected room type","overall_notes":"any important observations"}`,

    material: `You are a construction material estimation AI. Analyze this photo and estimate materials needed. Consider the visible space and provide practical estimates a contractor would need.
Respond ONLY in this JSON format, no markdown, no backticks:
{"materials":[{"item":"material name","quantity":0,"unit":"sheets|sqft|linear_ft|gallons|bags|boxes|rolls","notes":""}],"room_type":"detected room type","scope":"what work appears needed","labor_hours_estimate":{"low":0,"high":0},"cost_estimate_range":{"low":0,"high":0,"currency":"USD"},"assumptions":"key assumptions made"}`,

    document: `You are a construction site documentation AI. Analyze this photo and provide a detailed professional site report entry.
Respond ONLY in this JSON format, no markdown, no backticks:
{"location_type":"room/area type","condition":"current condition assessment","work_phase":"demolition|framing|rough-in|drywall|finishing|final","items_visible":["list of notable items/features"],"issues":["any concerns or problems spotted"],"progress_pct":0,"recommendations":["actionable next steps"],"summary":"2-3 sentence professional summary"}`,

    custom: `You are a construction AI assistant analyzing a job site photo. ${customPrompt}\nRespond in clear, practical language a contractor would use. Be specific with numbers and actionable details.`
  };

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({
      model: ANTHROPIC_MODEL, max_tokens: 1500, system: systemPrompts[mode],
      messages: [{ role:"user", content: [
        { type:"image", source:{ type:"base64", media_type:mediaType, data:base64 } },
        { type:"text", text: mode === "custom" ? customPrompt : `Analyze this construction photo in ${mode} mode.` }
      ]}]
    })
  });

  if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err.error?.message || `API error ${response.status}`); }
  const data = await response.json();
  const text = data.content?.map(b => b.text || "").join("") || "";
  if (mode === "custom") return { type:"custom", text };
  try { return { type:mode, data:JSON.parse(text.replace(/```json|```/g,"").trim()) }; }
  catch { return { type:"custom", text }; }
}

// ── Confidence Badge ────────────────────────────────────────
function ConfBadge({ level }) {
  return html`<span className=${"conf conf-" + level}>${level}</span>`;
}

// ══════════════════════════════════════════════════════════════
// ██  MAIN APP
// ══════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState("home");
  const [projects, setProjects] = useState([ { id:"default", name:"Quick Captures", captures:[], created:ts() } ]);
  const [activeProject, setActiveProject] = useState("default");
  const [capturedImage, setCapturedImage] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [mediaType, setMediaType] = useState("image/jpeg");
  const [analysisResult, setAnalysisResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [selectedCapture, setSelectedCapture] = useState(null);
  const [customQ, setCustomQ] = useState("");
  const [newProjectName, setNewProjectName] = useState("");
  const [showNewProject, setShowNewProject] = useState(false);
  const [apiKey, setApiKey] = useState(localStorage.getItem("sv_api_key") || "");
  const [showSettings, setShowSettings] = useState(false);
  const [error, setError] = useState(null);
  const fileRef = useRef(null);

  const loadingMessages = {
    measure:["Scanning surfaces...","Calculating dimensions...","Estimating measurements..."],
    material:["Identifying materials...","Calculating quantities...","Estimating costs..."],
    document:["Analyzing site conditions...","Documenting features...","Generating report..."],
    custom:["Processing your question...","Analyzing the image...","Generating response..."]
  };

  const saveKey = (k) => { setApiKey(k); localStorage.setItem("sv_api_key", k); };

  const runAnalysis = useCallback(async (mode, prompt = "") => {
    if (!imageBase64) return;
    if (!apiKey) { setShowSettings(true); return; }
    setError(null); setLoading(true);
    const msgs = loadingMessages[mode] || loadingMessages.custom;
    let i = 0; setLoadingMsg(msgs[0]);
    const interval = setInterval(() => { i = (i+1) % msgs.length; setLoadingMsg(msgs[i]); }, 2000);
    try {
      const result = await analyzeImage(imageBase64, mediaType, mode, prompt, apiKey);
      setAnalysisResult(result);
      const capture = { id:uid(), image:capturedImage, result, mode, timestamp:ts() };
      setProjects(prev => prev.map(p => p.id === activeProject ? { ...p, captures:[capture,...p.captures] } : p));
      setSelectedCapture(capture); setView("results");
    } catch(err) { setError(err.message); setAnalysisResult(null); }
    finally { clearInterval(interval); setLoading(false); }
  }, [imageBase64, mediaType, capturedImage, activeProject, apiKey]);

  const handleImageUpload = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setMediaType(file.type || "image/jpeg");
    const url = URL.createObjectURL(file);
    setCapturedImage(url);
    fileToBase64(file).then(b64 => { setImageBase64(b64); setView("capture"); });
    e.target.value = "";
  };

  const clearCapture = () => { setCapturedImage(null); setImageBase64(null); setAnalysisResult(null); setSelectedCapture(null); setError(null); };
  const activeProj = projects.find(p => p.id === activeProject);
  const addProject = () => {
    if (!newProjectName.trim()) return;
    const p = { id:uid(), name:newProjectName.trim(), captures:[], created:ts() };
    setProjects(prev => [...prev, p]); setActiveProject(p.id); setNewProjectName(""); setShowNewProject(false);
  };
  const deleteCapture = (captureId) => {
    setProjects(prev => prev.map(p => ({ ...p, captures:p.captures.filter(c => c.id !== captureId) })));
    if (selectedCapture?.id === captureId) { setSelectedCapture(null); setView("home"); }
  };
  const goBack = () => { if (view === "results" || view === "capture") { clearCapture(); setView("home"); } else setView("home"); };

  // ── Settings Modal ────────────────────────────────────────
  function SettingsModal() {
    return html`
      <div className="loading-overlay" onClick=${() => setShowSettings(false)}>
        <div className="loading-box fade-in" onClick=${e => e.stopPropagation()} style=${{ textAlign:"left", padding:24 }}>
          <div style=${{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <div style=${{ fontSize:15, fontWeight:800, color:"#fff" }}>API Settings</div>
            <button className="back-btn" onClick=${() => setShowSettings(false)}>${icon("x",20)}</button>
          </div>
          <div className="tag">Anthropic API Key</div>
          <p style=${{ fontSize:11, color:"#666", marginBottom:12, lineHeight:1.5 }}>
            Your key stays in your browser's local storage. Never sent anywhere except Anthropic's API.
          </p>
          <input type="password" className="input" value=${apiKey} onInput=${e => saveKey(e.target.value)}
            placeholder="sk-ant-..." style=${{ marginBottom:12 }} />
          <p style=${{ fontSize:10, color:"#555", lineHeight:1.5 }}>
            Get a key at ${" "}<a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener"
            style=${{ color:"#f97316" }}>console.anthropic.com</a>
          </p>
          ${apiKey && html`
            <div style=${{ marginTop:12, display:"flex", alignItems:"center", gap:6 }}>
              <span style=${{ color:"#22c55e" }}>${icon("check",14)}</span>
              <span style=${{ fontSize:11, color:"#22c55e" }}>Key saved</span>
            </div>
          `}
        </div>
      </div>
    `;
  }

  // ── Loading Overlay ───────────────────────────────────────
  function LoadingOverlay() {
    return html`
      <div className="loading-overlay">
        <div className="loading-box">
          <div className="loading-pulse"><span style=${{ color:"#f97316" }}>${icon("zap",28)}</span></div>
          <div style=${{ fontSize:14, fontWeight:700, color:"#fff", marginBottom:6 }}>${loadingMsg}</div>
          <div style=${{ fontSize:11, color:"#666" }}>AI analyzing your capture</div>
        </div>
      </div>
    `;
  }

  // ── HOME VIEW ─────────────────────────────────────────────
  function HomeView() {
    return html`
      <div className="body fade-in">
        <div style=${{ textAlign:"center", padding:"20px 0 32px" }}>
          <div style=${{ color:"#f97316", marginBottom:16 }}>${icon("glasses",48)}</div>
          <h1 style=${{ fontSize:24, fontWeight:900, color:"#fff", letterSpacing:-1 }}>SiteVision AI</h1>
          <p style=${{ fontSize:12, color:"#666", marginTop:6, letterSpacing:.5 }}>Construction Intelligence • Powered by Ray-Ban Meta</p>
        </div>

        <div className="capture-zone" onClick=${() => fileRef.current?.click()}>
          <div style=${{ color:"#f97316", marginBottom:12 }}>${icon("camera",36)}</div>
          <div style=${{ fontSize:15, fontWeight:800, color:"#fff", marginBottom:4 }}>New Capture</div>
          <div style=${{ fontSize:11, color:"#666" }}>Take a photo or upload from glasses</div>
        </div>
        <input ref=${fileRef} type="file" accept="image/*" capture="environment" onChange=${handleImageUpload} className="hidden" />

        <div className="actions-grid">
          ${[
            { ic:"ruler", label:"Measure", desc:"Dimensions" },
            { ic:"box", label:"Materials", desc:"Estimates" },
            { ic:"clipboard", label:"Document", desc:"Site report" },
          ].map(a => html`
            <div key=${a.ic} className="card action-card card-hover" onClick=${() => fileRef.current?.click()}>
              <div style=${{ color:"#f97316", marginBottom:8 }}>${icon(a.ic,20)}</div>
              <div style=${{ fontSize:12, fontWeight:700, color:"#fff" }}>${a.label}</div>
              <div style=${{ fontSize:9, color:"#555", marginTop:2 }}>${a.desc}</div>
            </div>
          `)}
        </div>

        ${!apiKey && html`
          <div className="card" style=${{ borderColor:"#f59e0b33", background:"#f59e0b08", cursor:"pointer" }} onClick=${() => setShowSettings(true)}>
            <div style=${{ display:"flex", alignItems:"center", gap:10 }}>
              <span style=${{ color:"#f59e0b" }}>${icon("key",18)}</span>
              <div>
                <div style=${{ fontSize:13, fontWeight:700, color:"#f59e0b" }}>Set up API Key</div>
                <div style=${{ fontSize:11, color:"#888", marginTop:2 }}>Required for AI analysis — tap to configure</div>
              </div>
            </div>
          </div>
        `}

        <div style=${{ display:"flex", alignItems:"center", justifyContent:"space-between", margin:"28px 0 12px" }}>
          <div className="tag">Projects</div>
          <button className="btn-sm" onClick=${() => setShowNewProject(true)} style=${{ padding:"6px 10px", fontSize:10 }}>
            ${icon("plus",12)} New
          </button>
        </div>

        ${showNewProject && html`
          <div className="card" style=${{ display:"flex", gap:8, alignItems:"center" }}>
            <input value=${newProjectName} onInput=${e => setNewProjectName(e.target.value)}
              onKeyDown=${e => e.key === "Enter" && addProject()} placeholder="Project name..." className="input" style=${{ flex:1 }} autoFocus />
            <button className="btn-sm btn-sm-accent" onClick=${addProject}>Add</button>
            <button className="btn-sm" onClick=${() => setShowNewProject(false)} style=${{ padding:10 }}>${icon("x",14)}</button>
          </div>
        `}

        ${projects.map(p => html`
          <div key=${p.id} className="card card-hover" onClick=${() => { setActiveProject(p.id); setView("project"); }}
            style=${{ display:"flex", alignItems:"center", gap:14 }}>
            <span style=${{ color:"#f97316" }}>${icon("folder",22)}</span>
            <div style=${{ flex:1 }}>
              <div style=${{ fontSize:14, fontWeight:700, color:"#fff" }}>${p.name}</div>
              <div style=${{ fontSize:11, color:"#555", marginTop:2 }}>${p.captures.length} capture${p.captures.length !== 1 ? "s" : ""} • ${p.created}</div>
            </div>
            <span style=${{ color:"#333" }}>${icon("chevronR",16)}</span>
          </div>
        `)}
      </div>
    `;
  }

  // ── CAPTURE VIEW ──────────────────────────────────────────
  function CaptureView() {
    const [mode, setMode] = useState("measure");
    const modes = [
      { id:"measure", ic:"ruler", title:"Measure", desc:"Estimate dimensions of walls, surfaces, openings" },
      { id:"material", ic:"box", title:"Materials", desc:"Estimate materials, quantities, and costs" },
      { id:"document", ic:"clipboard", title:"Document", desc:"Generate professional site report entry" },
      { id:"custom", ic:"chat", title:"Ask AI", desc:"Ask anything about this capture" },
    ];

    return html`
      <div className="body fade-in">
        <img src=${capturedImage} alt="capture" className="img-preview" />
        ${error && html`
          <div className="card issue-card mb-16">
            <div className="tag" style=${{ color:"#ef4444" }}>Error</div>
            <div style=${{ fontSize:12, color:"#fca5a5" }}>${error}</div>
          </div>
        `}
        <div className="tag mb-12">Analysis Mode</div>
        <div style=${{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
          ${modes.map(m => html`
            <div key=${m.id} className=${"mode-card" + (mode === m.id ? " active" : "")} onClick=${() => setMode(m.id)}>
              <span className="mode-icon" style=${{ marginTop:2 }}>${icon(m.ic,20)}</span>
              <div>
                <div className="mode-title" style=${{ fontSize:13, fontWeight:700 }}>${m.title}</div>
                <div style=${{ fontSize:11, color:"#666", marginTop:2 }}>${m.desc}</div>
              </div>
            </div>
          `)}
        </div>
        ${mode === "custom" && html`
          <div className="mb-16">
            <input value=${customQ} onInput=${e => setCustomQ(e.target.value)}
              placeholder="e.g. How many outlets do I need here?" className="input" />
          </div>
        `}
        <div className="flex-row">
          <button className="btn btn-secondary flex-1" onClick=${goBack}>Cancel</button>
          <button className="btn btn-primary flex-2" onClick=${() => runAnalysis(mode, customQ)}
            disabled=${mode === "custom" && !customQ.trim()}>
            ${icon("zap",16)} Analyze
          </button>
        </div>
      </div>
    `;
  }

  // ── RESULTS VIEW ──────────────────────────────────────────
  function ResultsView() {
    const result = selectedCapture?.result || analysisResult;
    if (!result) return null;

    function renderMeasure(data) {
      return html`
        <div className="fade-in">
          <div className="card ref-card">
            <div className="tag">Reference Used</div>
            <div style=${{ fontSize:13, color:"#fff", fontWeight:600 }}>${data.reference_used}</div>
            <div style=${{ fontSize:11, color:"#888", marginTop:4 }}>Room: ${data.room_type}</div>
          </div>
          ${(data.measurements || []).map((m, i) => html`
            <div key=${i} className="card">
              <div style=${{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div style=${{ fontSize:14, fontWeight:700, color:"#fff" }}>${m.surface}</div>
                <${ConfBadge} level=${m.confidence} />
              </div>
              <div className="grid-3">
                ${[
                  { label:"Width", val:m.width_ft ? m.width_ft + "'" : "—" },
                  { label:"Height", val:m.height_ft ? m.height_ft + "'" : "—" },
                  { label:"Area", val:m.area_sqft ? m.area_sqft + " ft²" : "—" },
                ].map((v,j) => html`
                  <div key=${j} className="metric-box">
                    <div className="metric-label">${v.label}</div>
                    <div className="metric-value">${v.val}</div>
                  </div>
                `)}
              </div>
              ${m.notes && html`<div style=${{ fontSize:11, color:"#888", marginTop:8 }}>${m.notes}</div>`}
            </div>
          `)}
          ${data.overall_notes && html`
            <div className="card note-card">
              <div className="tag">Notes</div>
              <div style=${{ fontSize:12, color:"#ccc", lineHeight:1.6 }}>${data.overall_notes}</div>
            </div>
          `}
        </div>
      `;
    }

    function renderMaterial(data) {
      return html`
        <div className="fade-in">
          <div className="card cost-card">
            <div style=${{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div className="tag">Scope</div>
                <div style=${{ fontSize:13, color:"#fff", fontWeight:600 }}>${data.scope}</div>
              </div>
              <div style=${{ textAlign:"right" }}>
                <div className="metric-label">Est. Cost</div>
                <div style=${{ fontSize:18, fontWeight:800, color:"#22c55e" }}>
                  $${data.cost_estimate_range?.low?.toLocaleString()} – $${data.cost_estimate_range?.high?.toLocaleString()}
                </div>
              </div>
            </div>
            ${data.labor_hours_estimate && html`
              <div style=${{ fontSize:11, color:"#888", marginTop:8, borderTop:"1px solid #1a1a1a", paddingTop:8 }}>
                Labor: ${data.labor_hours_estimate.low}–${data.labor_hours_estimate.high} hrs
              </div>
            `}
          </div>
          <div className="tag">Materials List</div>
          ${(data.materials || []).map((m,i) => html`
            <div key=${i} className="card" style=${{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style=${{ fontSize:13, fontWeight:700, color:"#fff" }}>${m.item}</div>
                ${m.notes && html`<div style=${{ fontSize:10, color:"#666", marginTop:2 }}>${m.notes}</div>`}
              </div>
              <div style=${{ textAlign:"right" }}>
                <span style=${{ fontSize:18, fontWeight:800, color:"#f97316" }}>${m.quantity}</span>
                <span style=${{ fontSize:11, color:"#888", marginLeft:4 }}>${m.unit}</span>
              </div>
            </div>
          `)}
          ${data.assumptions && html`
            <div className="card warn-card">
              <div className="tag">Assumptions</div>
              <div style=${{ fontSize:12, color:"#ccc", lineHeight:1.6 }}>${data.assumptions}</div>
            </div>
          `}
        </div>
      `;
    }

    function renderDocument(data) {
      return html`
        <div className="fade-in">
          <div className="grid-2 mb-12">
            ${[
              { label:"Location", val:data.location_type },
              { label:"Phase", val:data.work_phase },
              { label:"Condition", val:data.condition },
              { label:"Progress", val:data.progress_pct != null ? data.progress_pct + "%" : "—" },
            ].map((v,i) => html`
              <div key=${i} className="metric-box">
                <div className="metric-label">${v.label}</div>
                <div style=${{ fontSize:13, fontWeight:700, color:"#fff", marginTop:4 }}>${v.val}</div>
              </div>
            `)}
          </div>
          <div className="card">
            <div className="tag">Summary</div>
            <div style=${{ fontSize:13, color:"#ccc", lineHeight:1.7 }}>${data.summary}</div>
          </div>
          ${data.items_visible?.length > 0 && html`
            <div className="card">
              <div className="tag">Items Visible</div>
              <div>${data.items_visible.map((item,i) => html`<span key=${i} className="pill">${item}</span>`)}</div>
            </div>
          `}
          ${data.issues?.length > 0 && html`
            <div className="card issue-card">
              <div className="tag" style=${{ color:"#ef4444" }}>Issues Flagged</div>
              ${data.issues.map((issue,i) => html`<div key=${i} className="issue-item">• ${issue}</div>`)}
            </div>
          `}
          ${data.recommendations?.length > 0 && html`
            <div className="card rec-card">
              <div className="tag" style=${{ color:"#22c55e" }}>Recommendations</div>
              ${data.recommendations.map((rec,i) => html`<div key=${i} className="rec-item"><span style=${{ color:"#22c55e", marginRight:6 }}>→</span>${rec}</div>`)}
            </div>
          `}
        </div>
      `;
    }

    return html`
      <div className="body fade-in">
        ${selectedCapture && html`<img src=${selectedCapture.image} alt="capture" className="img-preview" style=${{ maxHeight:200, objectFit:"cover" }} />`}
        <div style=${{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
          <span style=${{ color:"#f97316" }}>${icon("check",20)}</span>
          <div style=${{ fontSize:14, fontWeight:700, color:"#fff", flex:1 }}>Analysis Complete</div>
          <span className="result-badge">${result.type}</span>
        </div>
        ${result.type === "measure" && renderMeasure(result.data)}
        ${result.type === "material" && renderMaterial(result.data)}
        ${result.type === "document" && renderDocument(result.data)}
        ${result.type === "custom" && html`
          <div className="card fade-in">
            <div className="tag">AI Response</div>
            <div style=${{ fontSize:13, color:"#ccc", lineHeight:1.8, whiteSpace:"pre-wrap" }}>${result.text}</div>
          </div>
        `}
        <div className="flex-row mt-20">
          <button className="btn btn-secondary flex-1" onClick=${() => { clearCapture(); setView("home"); }}>Done</button>
          <button className="btn btn-primary flex-1" onClick=${() => { setView("capture"); setAnalysisResult(null); setError(null); }}>Re-analyze</button>
        </div>
      </div>
    `;
  }

  // ── PROJECT VIEW ──────────────────────────────────────────
  function ProjectView() {
    return html`
      <div className="body fade-in">
        <div style=${{ display:"flex", alignItems:"center", gap:12, marginBottom:24 }}>
          <span style=${{ color:"#f97316" }}>${icon("folder",24)}</span>
          <div>
            <div className="section-title">${activeProj?.name}</div>
            <div style=${{ fontSize:11, color:"#666" }}>${activeProj?.captures.length} captures</div>
          </div>
        </div>
        <button className="btn btn-primary mb-20" onClick=${() => fileRef.current?.click()}>
          ${icon("camera",16)} New Capture
        </button>
        <input ref=${fileRef} type="file" accept="image/*" capture="environment" onChange=${handleImageUpload} className="hidden" />
        ${activeProj?.captures.length === 0 && html`
          <div className="card text-center" style=${{ padding:32 }}>
            <div style=${{ fontSize:13, color:"#555" }}>No captures yet. Take your first photo.</div>
          </div>
        `}
        ${activeProj?.captures.map(c => html`
          <div key=${c.id} className="card" style=${{ display:"flex", gap:14, alignItems:"flex-start" }}>
            <img src=${c.image} alt="" style=${{ width:64, height:64, borderRadius:8, objectFit:"cover", cursor:"pointer", border:"1px solid #1f1f1f" }}
              onClick=${() => { setSelectedCapture(c); setAnalysisResult(c.result); setCapturedImage(c.image); setView("results"); }} />
            <div style=${{ flex:1, minWidth:0 }}>
              <div style=${{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span className="mode-badge">${c.mode}</span>
                <span style=${{ fontSize:10, color:"#555" }}>${c.timestamp}</span>
              </div>
              <div style=${{ fontSize:12, color:"#ccc", marginTop:6, cursor:"pointer" }}
                onClick=${() => { setSelectedCapture(c); setAnalysisResult(c.result); setCapturedImage(c.image); setView("results"); }}>
                ${c.result?.type === "measure" ? (c.result.data?.measurements?.length || 0) + " measurements • " + (c.result.data?.room_type || "Room") : ""}
                ${c.result?.type === "material" ? (c.result.data?.materials?.length || 0) + " materials • $" + (c.result.data?.cost_estimate_range?.low || 0) + "–$" + (c.result.data?.cost_estimate_range?.high || 0) : ""}
                ${c.result?.type === "document" ? (c.result.data?.summary || "").slice(0,80) + "..." : ""}
                ${c.result?.type === "custom" ? (c.result.text || "").slice(0,80) + "..." : ""}
              </div>
              <button className="btn-sm mt-8" style=${{ padding:"4px 8px", fontSize:10, color:"#666", borderColor:"#1a1a1a" }}
                onClick=${(e) => { e.stopPropagation(); deleteCapture(c.id); }}>
                ${icon("trash",10)} Remove
              </button>
            </div>
          </div>
        `)}
      </div>
    `;
  }

  // ── MAIN RENDER ───────────────────────────────────────────
  return html`
    <div className="app">
      <div className="header">
        ${view !== "home" && html`<button className="back-btn" onClick=${goBack}>${icon("chevron",20)}</button>`}
        <span style=${{ color:"#f97316" }}>${icon("glasses",28)}</span>
        <div style=${{ flex:1 }}>
          <div style=${{ fontSize:15, fontWeight:700, color:"#fff", letterSpacing:-.5 }}>SiteVision AI</div>
          <div style=${{ fontSize:9, fontWeight:500, letterSpacing:2.5, color:"#f97316", textTransform:"uppercase" }}>Construction Intelligence</div>
        </div>
        <button className="back-btn" onClick=${() => setShowSettings(true)} style=${{ color:apiKey ? "#333" : "#f59e0b" }}>
          ${icon("key",18)}
        </button>
        <div className="status-dot" style=${apiKey ? {} : { background:"#f59e0b", boxShadow:"0 0 8px #f59e0b66" }}></div>
      </div>
      ${view === "home" && html`<${HomeView} />`}
      ${view === "capture" && html`<${CaptureView} />`}
      ${view === "results" && html`<${ResultsView} />`}
      ${view === "project" && html`<${ProjectView} />`}
      ${loading && html`<${LoadingOverlay} />`}
      ${showSettings && html`<${SettingsModal} />`}
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
