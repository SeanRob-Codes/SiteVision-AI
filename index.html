<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  height:100%;background:#050505;color:#d4d4d4;
  font-family:'Outfit','Space Grotesk',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
#root{height:100%}
input::placeholder{color:#3a3a3a}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}
::selection{background:#f97316;color:#000}

@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.12);opacity:.6}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 12px #f9731633}50%{box-shadow:0 0 24px #f9731666}}
@keyframes toastIn{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{from{transform:translateY(0);opacity:1}to{transform:translateY(-100%);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.anim-slide-up{animation:slideUp .35s cubic-bezier(.22,1,.36,1) both}
.anim-fade{animation:fadeIn .3s ease both}

.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:#050505}

/* ── Header ─────────────────────── */
.header{
  background:#080808;border-bottom:1px solid #141414;
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.header-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1}
.header-sub{font-size:8px;font-weight:700;letter-spacing:3px;color:#f97316;text-transform:uppercase;margin-top:2px}

/* ── Body / Sections ────────────── */
.body{padding:16px;padding-bottom:100px}
.section{margin-bottom:24px}

/* ── Cards ───────────────────────── */
.card{
  background:#0a0a0a;border:1px solid #161616;
  border-radius:14px;padding:18px;margin-bottom:10px;
  transition:border-color .2s,transform .15s,box-shadow .2s;
}
.card-press{cursor:pointer}
.card-press:active{transform:scale(.985);border-color:#252525}
.card-glow:hover{border-color:#f9731633;box-shadow:0 0 20px #f9731608}

/* ── Buttons ─────────────────────── */
.btn{
  border-radius:12px;padding:14px 20px;font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;width:100%;transition:all .15s;border:none;
  position:relative;overflow:hidden;
}
.btn:active{transform:scale(.97)}
.btn-prime{background:#f97316;color:#000;letter-spacing:.3px;font-weight:800}
.btn-prime:hover{background:#fb923c}
.btn-prime:disabled{background:#f9731644;color:#00000066}
.btn-ghost{background:#0f0f0f;color:#999;border:1px solid #1a1a1a}
.btn-ghost:hover{border-color:#2a2a2a;color:#ccc}
.btn-danger{background:#7f1d1d33;color:#fca5a5;border:1px solid #7f1d1d44}
.btn-sm{
  border-radius:8px;padding:8px 14px;font-size:11px;font-weight:700;
  font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  background:#0f0f0f;color:#888;border:1px solid #1a1a1a;transition:all .15s;
}
.btn-sm:active{transform:scale(.95)}
.btn-sm-prime{background:#f97316;color:#000;border-color:transparent}

/* ── Tags & Badges ───────────────── */
.tag{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:6px}
.badge{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.badge-orange{color:#f97316;background:#f9731614;border:1px solid #f9731622}
.badge-green{color:#22c55e;background:#22c55e14;border:1px solid #22c55e22}
.badge-red{color:#ef4444;background:#ef444414;border:1px solid #ef444422}
.badge-yellow{color:#f59e0b;background:#f59e0b14;border:1px solid #f59e0b22}
.badge-blue{color:#3b82f6;background:#3b82f614;border:1px solid #3b82f622}

/* ── Confidence ──────────────────── */
.conf-high{color:#22c55e;background:#22c55e14;border:1px solid #22c55e28}
.conf-medium{color:#f59e0b;background:#f59e0b14;border:1px solid #f59e0b28}
.conf-low{color:#ef4444;background:#ef444414;border:1px solid #ef444428}

/* ── Inputs ──────────────────────── */
.input{
  background:#080808;border:1px solid #1a1a1a;border-radius:10px;
  padding:13px 16px;color:#fff;font-size:13px;font-family:inherit;
  width:100%;outline:none;transition:border-color .2s;
}
.input:focus{border-color:#f97316}

/* ── Metric Boxes ────────────────── */
.metric{
  background:#080808;border:1px solid #141414;border-radius:10px;
  padding:14px;text-align:center;position:relative;overflow:hidden;
}
.metric-label{font-size:8px;color:#444;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.metric-val{font-size:17px;font-weight:800;color:#f97316;margin-top:5px;font-family:'IBM Plex Mono',monospace}

/* ── Image ───────────────────────── */
.img-preview{
  width:100%;border-radius:12px;border:1px solid #161616;
  margin-bottom:14px;display:block;background:#080808;
}
.img-thumb{
  width:60px;height:60px;border-radius:10px;object-fit:cover;
  border:1px solid #161616;cursor:pointer;flex-shrink:0;
  transition:border-color .2s;
}
.img-thumb:hover{border-color:#f97316}

/* ── Capture Zone ────────────────── */
.capture-zone{
  border:2px dashed #f9731644;text-align:center;cursor:pointer;
  padding:36px 20px;background:#f9731604;border-radius:16px;
  transition:all .2s;position:relative;overflow:hidden;
}
.capture-zone:hover{border-color:#f97316;background:#f9731608}
.capture-zone::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,#f9731608 0%,transparent 70%);
  pointer-events:none;
}

/* ── Mode Cards ──────────────────── */
.mode-card{
  background:#0a0a0a;border:1px solid #161616;border-radius:12px;
  padding:16px;cursor:pointer;transition:all .2s;
  display:flex;align-items:flex-start;gap:14px;
}
.mode-card:active{transform:scale(.98)}
.mode-card.active{background:#f9731609;border-color:#f9731666}
.mode-card .m-icon{color:#333;transition:color .2s}
.mode-card.active .m-icon{color:#f97316}
.mode-card .m-title{color:#888;font-weight:700;font-size:13px;transition:color .2s}
.mode-card.active .m-title{color:#fff}

/* ── Loading ─────────────────────── */
.overlay{
  position:fixed;inset:0;background:#050505ee;
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;animation:fadeIn .2s ease;
}
.load-box{
  background:#0a0a0a;border:1px solid #f9731633;border-radius:20px;
  padding:44px 36px;text-align:center;max-width:300px;width:100%;
}
.load-ring{
  width:52px;height:52px;border-radius:50%;
  border:2px solid #1a1a1a;border-top-color:#f97316;
  margin:0 auto 20px;animation:spin .8s linear infinite;
}

/* ── Toast ────────────────────────── */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  z-index:2000;padding:12px 20px;border-radius:10px;
  font-size:12px;font-weight:600;max-width:340px;
  animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 32px #00000066;
}
.toast-success{background:#052e16;color:#86efac;border:1px solid #14532d}
.toast-error{background:#2a0a0a;color:#fca5a5;border:1px solid #7f1d1d}
.toast-info{background:#0c1222;color:#93c5fd;border:1px solid #1e3a5f}

/* ── Tabs ────────────────────────── */
.tab-row{display:flex;gap:4px;background:#080808;border-radius:10px;padding:3px;border:1px solid #141414}
.tab{
  flex:1;padding:8px;text-align:center;border-radius:8px;
  font-size:11px;font-weight:700;color:#555;cursor:pointer;
  transition:all .2s;border:none;background:transparent;font-family:inherit;
}
.tab.active{background:#f97316;color:#000}
.tab:not(.active):hover{color:#999}

/* ── Grids ────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.row{display:flex;gap:8px}
.f1{flex:1}.f2{flex:2}

/* ── Stat strip ──────────────────── */
.stat-strip{
  display:flex;gap:1px;background:#141414;border-radius:12px;overflow:hidden;
  margin-bottom:16px;border:1px solid #141414;
}
.stat-item{
  flex:1;padding:14px 8px;text-align:center;background:#0a0a0a;
}
.stat-num{font-size:20px;font-weight:900;color:#fff;font-family:'IBM Plex Mono',monospace;animation:countUp .5s ease both}
.stat-lbl{font-size:8px;color:#444;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-top:2px}

/* ── Search ──────────────────────── */
.search-bar{
  background:#080808;border:1px solid #1a1a1a;border-radius:10px;
  padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.search-bar input{
  background:none;border:none;outline:none;color:#fff;
  font-size:13px;font-family:inherit;flex:1;
}

/* ── Result Accent Cards ─────────── */
.r-note{border-left:3px solid #f97316}
.r-issue{border-left:3px solid #ef4444}
.r-rec{border-left:3px solid #22c55e}
.r-warn{border-left:3px solid #f59e0b}
.r-ref{border-color:#f9731633;background:#f9731606}
.r-cost{border-color:#22c55e33;background:#22c55e06}

/* ── Pill Tags ───────────────────── */
.pill{font-size:10px;background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:4px 10px;color:#aaa;display:inline-block;margin:2px}

/* ── Fullscreen Image Viewer ─────── */
.viewer{
  position:fixed;inset:0;background:#000;z-index:1500;
  display:flex;flex-direction:column;animation:fadeIn .2s ease;
}
.viewer img{flex:1;object-fit:contain;width:100%;min-height:0}
.viewer-bar{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:#080808}

/* ── Empty State ─────────────────── */
.empty{text-align:center;padding:40px 20px;color:#333}
.empty-icon{margin-bottom:12px;opacity:.3}

/* ── Misc ────────────────────────── */
.hidden{display:none}
.back-btn{background:none;border:none;color:#555;cursor:pointer;padding:4px;display:flex;align-items:center;transition:color .2s}
.back-btn:hover{color:#fff}
.dot{width:7px;height:7px;border-radius:50%}
.dot-green{background:#22c55e;box-shadow:0 0 8px #22c55e55}
.dot-yellow{background:#f59e0b;box-shadow:0 0 8px #f59e0b55}
.dot-red{background:#ef4444;box-shadow:0 0 8px #ef444455}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mono{font-family:'IBM Plex Mono',monospace}
.nowrap{white-space:nowrap}
</style>
</head>

// ══════════════════════════════════════════════════════════
// IMAGE PROCESSING — bullet-proof iOS/HEIC handling
// ══════════════════════════════════════════════════════════
function processImage(file) {
  return new Promise(function(resolve, reject) {
    if (!file) { reject(new Error("No file selected")); return; }

    var url;
    try { url = URL.createObjectURL(file); }
    catch(e) { reject(new Error("Cannot read file: " + (e.message || e))); return; }

    var img = new Image();
    var timeout = setTimeout(function() {
      cleanup();
      reject(new Error("Image load timed out — try a smaller photo or different format"));
    }, 15000);

    function cleanup() { clearTimeout(timeout); try { URL.revokeObjectURL(url); } catch(e) {} }

    img.onload = function() {
      try {
        var w = img.naturalWidth || img.width;
        var h2 = img.naturalHeight || img.height;
        if (w === 0 || h2 === 0) { cleanup(); reject(new Error("Image has no dimensions")); return; }

        // Resize if needed
        if (w > MAX_IMG_DIM || h2 > MAX_IMG_DIM) {

          else { w = Math.round(w * MAX_IMG_DIM / h2); h2 = MAX_IMG_DIM; }
        }

        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h2;
        var ctx = canvas.getContext("2d");
        if (!ctx) { cleanup(); reject(new Error("Canvas not supported")); return; }

        ctx.drawImage(img, 0, 0, w, h2);
        var dataUrl = canvas.toDataURL("image/jpeg", JPEG_QUALITY);
        var b64 = dataUrl.split(",")[1];

        resolve({ base64: b64, preview: dataUrl, width: w, height: h2 });
      } catch(e) {
        cleanup();
        reject(new Error("Image processing failed: " + (e.message || e)));
      }
    };

    img.onerror = function() { cleanup(); reject(new Error("Cannot decode image — may be corrupted or unsupported format")); };
    img.src = url;
  });
}

// STORAGE — persist projects to localStorage

function saveProjects(projects) {
  try {
    // Strip base64 image data before saving (too large for localStorage)
    // Keep only thumbnails and results
    var slim = projects.map(function(p) {
      return {
        id: p.id, name: p.name, created: p.created,
        captures: p.captures.map(function(c) {
          return { id:c.id, mode:c.mode, timestamp:c.timestamp, result:c.result, hasImage:true };

// AI ANALYSIS — with retry logic
// ══════════════════════════════════════════════════════════
var PROMPTS = {
  measure: 'You are a construction measurement estimation AI. Analyze this construction site photo:\n1. Identify all visible surfaces, openings, structural elements\n2. Find ANY reference objects for scale (doors ~6\'8" tall, outlets ~4.5" tall, 2x4 lumber 1.5"x3.5", bricks ~2.25"x3.625"x7.625", ceiling tiles 2\'x2\' or 2\'x4\', interior doors ~3\'x6\'8", baseboards ~3-5" tall, switch plates ~4.5"x2.75")\n3. Estimate dimensions of all measurable surfaces\n4. Note confidence for each (high/medium/low)\nRespond ONLY in JSON, no markdown no backticks:\n{"measurements":[{"surface":"name","width_ft":0,"height_ft":0,"area_sqft":0,"confidence":"high|medium|low","notes":""}],"reference_used":"what you used for scale","room_type":"detected room type","overall_notes":"observations"}',

  material: 'You are a construction material estimation AI. Analyze this photo and estimate all materials needed.\nRespond ONLY in JSON, no markdown no backticks:\n{"materials":[{"item":"name","quantity":0,"unit":"sheets|sqft|linear_ft|gallons|bags|boxes|rolls","notes":""}],"room_type":"type","scope":"work needed","labor_hours_estimate":{"low":0,"high":0},"cost_estimate_range":{"low":0,"high":0,"currency":"USD"},"assumptions":"key assumptions"}',

  document: 'You are a construction site documentation AI. Provide a detailed professional site report.\nRespond ONLY in JSON, no markdown no backticks:\n{"location_type":"room/area type","condition":"assessment","work_phase":"demolition|framing|rough-in|drywall|finishing|final","items_visible":["items"],"issues":["concerns"],"progress_pct":0,"recommendations":["next steps"],"summary":"2-3 sentence summary"}',

  custom: 'You are a construction AI assistant. Respond in clear practical language a contractor would use. Be specific with numbers and actionable details.'
};

async function callAPI(base64, mode, customPrompt, apiKey, attempt) {
  attempt = attempt || 0;

  var sysPrompt = mode === "custom" ? PROMPTS.custom + "\n\n" + customPrompt : PROMPTS[mode];
  var userText = mode === "custom" ? customPrompt : "Analyze this construction photo in " + mode + " mode.";

  var response;
  try {
    response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: MODEL, max_tokens: 2000, system: sysPrompt,
        messages: [{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:base64 } },
          { type:"text", text:userText }
        ]}]
      })
    });
  } catch(e) {
    var errName = (e && e.name) ? e.name : "Unknown";
    var errMessage = (e && e.message) ? e.message : String(e);
    // TypeError with no message = CORS block in Safari
    if (errName === "TypeError" && (!errMessage || errMessage === "Type error" || errMessage === "Load failed")) {
      if (attempt < MAX_RETRIES) {
        await sleep(RETRY_DELAY * (attempt + 1));
        return callAPI(base64, mode, customPrompt, apiKey, attempt + 1);
      }
      throw new Error("Connection blocked — Safari may be blocking the API call. Try opening the app in Safari (not as a home screen app), or check that your API key is correct. [" + errName + ": " + errMessage + "]");
    }
    if (attempt < MAX_RETRIES) {
      await sleep(RETRY_DELAY * (attempt + 1));
      return callAPI(base64, mode, customPrompt, apiKey, attempt + 1);
    }
    throw new Error("Network error after " + (attempt + 1) + " tries: " + errName + " — " + errMessage);
  }

  if (!response.ok) {
    var errMsg = "API error " + response.status;
    try {
      var body = await response.json();
      if (body && body.error) { errMsg = body.error.message || body.error.type || errMsg; }
    } catch(e) {}

    // Retry on 429 (rate limit) or 5xx (server error)
    if ((response.status === 429 || response.status >= 500) && attempt < MAX_RETRIES) {
      await sleep(RETRY_DELAY * (attempt + 1));
      return callAPI(base64, mode, customPrompt, apiKey, attempt + 1);
    }

    if (response.status === 401) throw new Error("Invalid API key — check your key in settings");
    if (response.status === 403) throw new Error("API key doesn't have permission — check your Anthropic plan");
    if (response.status === 429) throw new Error("Rate limited — wait a moment and try again");
    throw new Error(errMsg);
  }

  var data;
  try { data = await response.json(); } catch(e) { throw new Error("Could not parse response from API"); }

  var textParts = [];
  if (data.content && Array.isArray(data.content)) {
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i] && data.content[i].type === "text" && data.content[i].text) {
        textParts.push(data.content[i].text);
      }
    }
  }
  var text = textParts.join("");
  if (!text) throw new Error("Empty response — try again or use a clearer photo");

  if (mode === "custom") return { type:"custom", text:text };

  try {
    var clean = text.replace(/```json/g,"").replace(/```/g,"").trim();
    return { type:mode, data:JSON.parse(clean) };
  } catch(e) {
    // If JSON parse fails, return as text — still useful
    return { type:"custom", text:text };
  }
}

function useToast() {
  var ref = useState(null);
  var toast = ref[0]; var setToast = ref[1];

  function show(msg, type) {
    type = type || "info";
    setToast({ msg:msg, type:type, id:uid() });
    setTimeout(function() { setToast(null); }, 3500);
  }

  function ToastEl() {
    if (!toast) return null;
    return html`<div key=${toast.id} className=${"toast toast-" + toast.type}>
      ${toast.type === "success" ? ic("check", 14) : toast.type === "error" ? ic("x", 14) : ic("zap", 14)}
      ${toast.msg}
    </div>`;
  }

  return { show:show, Toast:ToastEl };
}

              <div style=${{ flex:1, minWidth:0 }}>
                <div style=${{ fontSize:13, fontWeight:700, color:"#fff" }} className="truncate">${p.name}</div>
                <div style=${{ fontSize:10, color:"#333", marginTop:2 }}>
                  ${p.captures.length} capture${p.captures.length !== 1 ? "s" : ""}${p.created ? " • " + p.created : ""}
                </div>
              </div>
              <span style=${{ color:"#1a1a1a" }}>${ic("chevR",16)}</span>
            </div>
          `;
        })}
      </div>
    `;
  }

  // ══════════════════════════════════════════════════════
  // CAPTURE VIEW — mode picker
  // ══════════════════════════════════════════════════════
  function CaptureView() {
    var _m = useState("measure"); var mode = _m[0]; var setMode = _m[1];
    var modes = [
      { id:"measure", ic:"ruler", title:"Measure", desc:"Walls, surfaces, openings — with dimensions", color:"#f97316" },
      { id:"material", ic:"box", title:"Materials", desc:"Quantities, costs, and labor estimates", color:"#22c55e" },
      { id:"document", ic:"clipboard", title:"Document", desc:"Professional site condition report", color:"#3b82f6" },
      { id:"custom", ic:"chat", title:"Ask AI", desc:"Ask anything about what you see", color:"#a855f7" },
    ];

    return html`
      <div className="body anim-slide-up">
        ${imgData && html`
          <div style=${{ position:"relative", marginBottom:14 }}>
            <img src=${imgData.preview} alt="capture" className="img-preview" style=${{ marginBottom:0 }}
              onClick=${function() { setViewerImg(imgData.preview); }} />
            <div style=${{ position:"absolute", bottom:8, right:8 }}>
              <span className="badge badge-orange">${imgData.width}×${imgData.height}</span>
            </div>
          </div>
        `}

        ${error && html`
          <div className="card r-issue anim-slide-up" style=${{ marginBottom:14 }}>
            <div className="tag" style=${{ color:"#ef4444" }}>Error</div>
            <div style=${{ fontSize:12, color:"#fca5a5", lineHeight:1.5 }}>${error}</div>
            <button className="btn-sm" style=${{ marginTop:10 }} onClick=${function() { setError(null); }}>Dismiss</button>
          </div>
        `}

        <div className="tag" style=${{ marginBottom:10 }}>Analysis Mode</div>
        <div style=${{ display:"flex", flexDirection:"column", gap:6, marginBottom:16 }}>
          ${modes.map(function(m) {
            return html`
              <div key=${m.id} className=${"mode-card" + (mode === m.id ? " active" : "")}
                onClick=${function() { setMode(m.id); }}>
                <span className="m-icon" style=${{ marginTop:2, color: mode === m.id ? m.color : undefined }}>${ic(m.ic, 20)}</span>
                <div style=${{ flex:1 }}>
                  <div className="m-title">${m.title}</div>
                  <div style=${{ fontSize:11, color:"#444", marginTop:2 }}>${m.desc}</div>
                </div>
                ${mode === m.id && html`<div className="dot dot-green" style=${{ marginTop:6 }}></div>`}
              </div>
            `;
          })}
        </div>

        ${mode === "custom" && html`
          <div style=${{ marginBottom:16 }}>
            <input value=${customQ} onInput=${function(e) { setCustomQ(e.target.value); }}
              placeholder="e.g. How many outlets does this room need?" className="input" />
            <div style=${{ display:"flex", gap:6, marginTop:8, flexWrap:"wrap" }}>
              ${["Is this to code?","Material recommendations","Safety concerns","Cost to finish"].map(function(q) {
                return html`<button key=${q} className="btn-sm" style=${{ fontSize:9, padding:"4px 8px" }}
                  onClick=${function() { setCustomQ(q); }}>${q}</button>`;
              })}
            </div>
          </div>
        `}

        <div className="row">
          <button className="btn btn-ghost f1" onClick=${goBack}>Cancel</button>
          <button className="btn btn-prime f2"
            onClick=${function() { runAnalysis(mode, customQ); }}
            disabled=${mode === "custom" && !customQ.trim()}>
            ${ic("zap",16)} Analyze
          </button>
        </div>
      </div>
    `;
  }

  // ══════════════════════════════════════════════════════
  // RESULTS VIEW
  // ══════════════════════════════════════════════════════
  function ResultsView() {
    var result = selectedCapture ? selectedCapture.result : analysisResult;
    if (!result) return null;

    function MeasureResults(props) {
      var d = props.data; if (!d) return null;
      return html`
        <div className="anim-slide-up">
          <div className="card r-ref">
            <div className="tag">Scale Reference</div>
            <div style=${{ fontSize:13, color:"#fff", fontWeight:700 }}>${d.reference_used || "Auto-detected"}</div>
            <div style=${{ fontSize:11, color:"#555", marginTop:3 }}>Room type: ${d.room_type || "Unknown"}</div>
          </div>
          ${(d.measurements || []).map(function(m, i) {
            return html`
              <div key=${i} className="card" style=${{ animationDelay: (i * 80) + "ms" }}>
                <div style=${{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                  <div style=${{ fontSize:14, fontWeight:700, color:"#fff" }}>${m.surface}</div>
                  <span className=${"badge conf-" + m.confidence}>${m.confidence}</span>
                </div>
                <div className="g3">
                  ${[
                    { l:"Width", v:m.width_ft ? m.width_ft + "'" : "—" },
                    { l:"Height", v:m.height_ft ? m.height_ft + "'" : "—" },
                    { l:"Area", v:m.area_sqft ? m.area_sqft + " ft²" : "—" },
                  ].map(function(x, j) {
                    return html`<div key=${j} className="metric"><div className="metric-label">${x.l}</div><div className="metric-val">${x.v}</div></div>`;
                  })}
                </div>
                ${m.notes && html`<div style=${{ fontSize:11, color:"#555", marginTop:8, lineHeight:1.5 }}>${m.notes}</div>`}
              </div>
            `;
          })}
          ${d.overall_notes && html`<div className="card r-note"><div className="tag">Notes</div><div style=${{ fontSize:12, color:"#aaa", lineHeight:1.6 }}>${d.overall_notes}</div></div>`}
        </div>
      `;
    }

    function MaterialResults(props) {
      var d = props.data; if (!d) return null;
      return html`
        <div className="anim-slide-up">
          <div className="card r-cost">
            <div style=${{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div className="tag">Scope</div>
                <div style=${{ fontSize:13, color:"#fff", fontWeight:700 }}>${d.scope || "General"}</div>
              </div>
              <div style=${{ textAlign:"right" }}>
                <div className="metric-label">Est. Cost</div>
                <div style=${{ fontSize:20, fontWeight:900, color:"#22c55e", fontFamily:"'IBM Plex Mono',monospace", marginTop:2 }}>
                  $${(d.cost_estimate_range && d.cost_estimate_range.low || 0).toLocaleString()} — $${(d.cost_estimate_range && d.cost_estimate_range.high || 0).toLocaleString()}
                </div>
              </div>
            </div>
            ${d.labor_hours_estimate && html`
              <div style=${{ fontSize:11, color:"#555", marginTop:10, paddingTop:10, borderTop:"1px solid #141414" }}>
                Labor estimate: <span className="mono" style=${{ color:"#fff" }}>${d.labor_hours_estimate.low}–${d.labor_hours_estimate.high} hrs</span>
              </div>
            `}
          </div>
          <div className="tag" style=${{ marginTop:16 }}>Materials List</div>
          ${(d.materials || []).map(function(m, i) {
            return html`
              <div key=${i} className="card" style=${{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style=${{ flex:1, minWidth:0 }}>
                  <div style=${{ fontSize:13, fontWeight:700, color:"#fff" }}>${m.item}</div>
                  ${m.notes && html`<div style=${{ fontSize:10, color:"#444", marginTop:2 }}>${m.notes}</div>`}
                </div>
                <div style=${{ textAlign:"right", flexShrink:0, marginLeft:12 }}>
                  <span className="mono" style=${{ fontSize:20, fontWeight:800, color:"#f97316" }}>${m.quantity}</span>
                  <span style=${{ fontSize:10, color:"#555", marginLeft:4 }}>${m.unit}</span>
                </div>
              </div>
            `;
          })}
          ${d.assumptions && html`<div className="card r-warn"><div className="tag">Assumptions</div><div style=${{ fontSize:12, color:"#aaa", lineHeight:1.6 }}>${d.assumptions}</div></div>`}
        </div>
      `;
    }

    function DocumentResults(props) {
      var d = props.data; if (!d) return null;
      return html`
        <div className="anim-slide-up">
          <div className="g2" style=${{ marginBottom:10 }}>
            ${[
              { l:"Location", v:d.location_type },
              { l:"Phase", v:d.work_phase },
              { l:"Condition", v:d.condition },
              { l:"Progress", v:d.progress_pct != null ? d.progress_pct + "%" : "—" },
            ].map(function(x, i) {
              return html`<div key=${i} className="metric"><div className="metric-label">${x.l}</div><div style=${{ fontSize:13, fontWeight:700, color:"#fff", marginTop:4 }}>${x.v}</div></div>`;
            })}
          </div>
          <div className="card"><div className="tag">Summary</div><div style=${{ fontSize:13, color:"#ccc", lineHeight:1.7 }}>${d.summary}</div></div>
          ${d.items_visible && d.items_visible.length > 0 && html`
            <div className="card"><div className="tag">Items Visible</div><div>${d.items_visible.map(function(x,i) { return html`<span key=${i} className="pill">${x}</span>`; })}</div></div>
          `}
          ${d.issues && d.issues.length > 0 && html`
            <div className="card r-issue"><div className="tag" style=${{ color:"#ef4444" }}>Issues</div>
              ${d.issues.map(function(x,i) { return html`<div key=${i} style=${{ fontSize:12, color:"#fca5a5", marginBottom:3 }}>• ${x}</div>`; })}
            </div>
          `}
          ${d.recommendations && d.recommendations.length > 0 && html`
            <div className="card r-rec"><div className="tag" style=${{ color:"#22c55e" }}>Recommendations</div>
              ${d.recommendations.map(function(x,i) { return html`<div key=${i} style=${{ fontSize:12, color:"#86efac", marginBottom:3 }}><span style=${{ color:"#22c55e", marginRight:6 }}>→</span>${x}</div>`; })}
            </div>
          `}
        </div>
      `;
    }

    return html`
      <div className="body anim-slide-up">
        ${selectedCapture && selectedCapture.image && html`
          <img src=${selectedCapture.image} alt="capture" className="img-preview"
            style=${{ maxHeight:180, objectFit:"cover", cursor:"pointer" }}
            onClick=${function() { setViewerImg(selectedCapture.image); }} />
        `}

        <div style=${{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
          <span style=${{ color:"#22c55e" }}>${ic("check",20)}</span>
          <div style=${{ fontSize:14, fontWeight:800, color:"#fff", flex:1 }}>Analysis Complete</div>
          <span className=${"badge badge-" + (result.type === "measure" ? "orange" : result.type === "material" ? "green" : result.type === "document" ? "blue" : "yellow")}>${result.type}</span>
        </div>

        ${result.type === "measure" && html`<${MeasureResults} data=${result.data} />`}
        ${result.type === "material" && html`<${MaterialResults} data=${result.data} />`}
        ${result.type === "document" && html`<${DocumentResults} data=${result.data} />`}
        ${result.type === "custom" && html`
          <div className="card"><div className="tag">AI Response</div><div style=${{ fontSize:13, color:"#ccc", lineHeight:1.8, whiteSpace:"pre-wrap" }}>${result.text}</div></div>
        `}

        <!-- Action Bar -->
        <div className="row" style=${{ marginTop:16, marginBottom:8 }}>
          <button className="btn-sm f1" onClick=${function() { copyToClipboard(resultToText(result)); }}>
            ${ic("copy",12)} Copy
          </button>
          <button className="btn-sm f1" onClick=${function() {
            if (navigator.share) {
              navigator.share({ title:"SiteVision AI Report", text:resultToText(result) }).catch(function(){});
            } else { copyToClipboard(resultToText(result)); }
          }}>
            ${ic("share",12)} Share
          </button>
        </div>

        <div className="row" style=${{ marginTop:8 }}>
          <button className="btn btn-ghost f1" onClick=${function() { clearCapture(); setView("home"); }}>Done</button>
          <button className="btn btn-prime f1" onClick=${function() { setView("capture"); setAnalysisResult(null); setError(null); }}>
            ${ic("refresh",14)} Re-analyze
          </button>
        </div>
      </div>
    `;
  }

  // ══════════════════════════════════════════════════════
  // PROJECT VIEW
  // ══════════════════════════════════════════════════════
  function ProjectView() {
    var captures = activeProj ? activeProj.captures : [];
    var filtered = searchQ ? captures.filter(function(c) {
      var s = searchQ.toLowerCase();
      return (c.mode && c.mode.indexOf(s) >= 0) ||
        (c.timestamp && c.timestamp.toLowerCase().indexOf(s) >= 0) ||
        (c.result && c.result.type === "custom" && c.result.text && c.result.text.toLowerCase().indexOf(s) >= 0);
    }) : captures;

    return html`
      <div className="body anim-slide-up">
        <div style=${{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
          <span style=${{ color:"#f97316" }}>${ic("folder",24)}</span>
          <div style=${{ flex:1 }}>
            <div className="section-title" style=${{ fontSize:18 }}>${activeProj ? activeProj.name : ""}</div>
            <div style=${{ fontSize:10, color:"#333", marginTop:2 }}>${captures.length} captures</div>
          </div>
          ${activeProj && activeProj.id !== "default" && html`
            <button className="btn-sm" style=${{ color:"#ef4444", borderColor:"#7f1d1d44" }}
              onClick=${function() { if (confirm("Delete this project and all its captures?")) deleteProject(activeProj.id); }}>
              ${ic("trash",12)}
            </button>
          `}
        </div>

        <button className="btn btn-prime" style=${{ marginBottom:16 }}
          onClick=${function() { if (fileRef.current) fileRef.current.click(); }}>
          ${ic("camera",16)} New Capture
        </button>
        <input ref=${fileRef} type="file" accept="image/*" onChange=${handleImageUpload} className="hidden" />

        ${captures.length > 3 && html`
          <div className="search-bar">
            ${ic("search",14)}
            <input value=${searchQ} onInput=${function(e) { setSearchQ(e.target.value); }}
              placeholder="Search captures..." />
          </div>
        `}

        ${filtered.length === 0 && html`
          <div className="empty">
            <div className="empty-icon">${ic("camera",40)}</div>
            <div style=${{ fontSize:13, color:"#333" }}>${searchQ ? "No matching captures" : "No captures yet"}</div>
          </div>
        `}

        ${filtered.map(function(c) {
          return html`
            <div key=${c.id} className="card" style=${{ display:"flex", gap:12, alignItems:"flex-start" }}>
              ${c.image ? html`
                <img src=${c.image} alt="" className="img-thumb"
                  onClick=${function() { setSelectedCapture(c); setAnalysisResult(c.result); if (c.image) setImgData({ preview:c.image, base64:null }); setView("results"); }} />
              ` : html`
                <div className="img-thumb" style=${{ display:"flex", alignItems:"center", justifyContent:"center", background:"#0a0a0a", color:"#333" }}
                  onClick=${function() { setSelectedCapture(c); setAnalysisResult(c.result); setView("results"); }}>
                  ${ic("camera",16)}
                </div>
              `}
              <div style=${{ flex:1, minWidth:0 }}>
                <div style=${{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span className="badge badge-orange">${c.mode}</span>
                  <span style=${{ fontSize:9, color:"#333" }}>${c.timestamp}</span>
                </div>
                <div style=${{ fontSize:11, color:"#888", marginTop:6, cursor:"pointer", lineHeight:1.4 }} className="truncate"
                  onClick=${function() { setSelectedCapture(c); setAnalysisResult(c.result); if (c.image) setImgData({ preview:c.image, base64:null }); setView("results"); }}>
                  ${c.result && c.result.type === "measure" ? ((c.result.data && c.result.data.measurements ? c.result.data.measurements.length : 0) + " measurements — " + (c.result.data && c.result.data.room_type || "")) : ""}
                  ${c.result && c.result.type === "material" ? ((c.result.data && c.result.data.materials ? c.result.data.materials.length : 0) + " materials — $" + (c.result.data && c.result.data.cost_estimate_range ? c.result.data.cost_estimate_range.low : 0) + "–$" + (c.result.data && c.result.data.cost_estimate_range ? c.result.data.cost_estimate_range.high : 0)) : ""}
                  ${c.result && c.result.type === "document" ? (c.result.data && c.result.data.summary ? c.result.data.summary.slice(0,70) + "..." : "") : ""}
                  ${c.result && c.result.type === "custom" ? (c.result.text ? c.result.text.slice(0,70) + "..." : "") : ""}
                </div>
                <button className="btn-sm" style=${{ marginTop:6, padding:"3px 8px", fontSize:9, color:"#444" }}
                  onClick=${function(e) { e.stopPropagation(); deleteCapture(c.id); }}>
                  ${ic("trash",10)} Remove
                </button>
              </div>
            </div>
          `;
        })}
      </div>
    `;
  }

  // ══════════════════════════════════════════════════════
  // MAIN RENDER
  // ══════════════════════════════════════════════════════
  return html`
    <div className="app">
      <div className="header">
        ${view !== "home" && html`<button className="back-btn" onClick=${goBack}>${ic("chevL",20)}</button>`}
        <span style=${{ color:"#f97316", filter:"drop-shadow(0 0 8px #f9731633)" }}>${ic("glasses",26)}</span>
        <div style=${{ flex:1 }}>
          <div className="header-title">SiteVision AI</div>
          <div className="header-sub">Construction Intelligence</div>
        </div>
        <button className="back-btn" onClick=${function() { setShowSettings(true); }}
          style=${{ color: apiKey ? "#222" : "#f59e0b" }}>
          ${ic("settings",17)}
        </button>
        <div className=${"dot " + (apiKey ? "dot-green" : "dot-yellow")}></div>
      </div>

      ${view === "home" && html`<${HomeView} />`}
      ${view === "capture" && html`<${CaptureView} />`}
      ${view === "results" && html`<${ResultsView} />`}
      ${view === "project" && html`<${ProjectView} />`}

      ${loading && html`<${LoadingOverlay} />`}
      ${showSettings && html`<${SettingsModal} />`}
      <${ImageViewer} />
      <${toaster.Toast} />
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
